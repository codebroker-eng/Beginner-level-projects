<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
      }
      html {
        font-size: 62.5%;
      }
      .box {
        width: 32rem;
        height: 35rem;
        background-color: rgba(187, 189, 187, 0.489);
        border-radius: 0.8rem;
        text-align: center;
        padding: 2rem 1rem;
        margin: 2rem auto;
        border: 0.1rem solid rgba(97, 94, 94, 0.237);
        box-shadow: 0.2rem 0.3rem 0.5rem;
      }
      .img img {
        width: 10rem;
        height: 10rem;
        border-radius: 50%;
        border: 0.2rem solid rgba(137, 43, 226, 0.792);
      }

      .img-description h1 {
        font-size: 2.6rem;
        padding-top: 0.8rem;
      }

      .img-description span {
        color: rgba(137, 43, 226, 0.792);
        font-weight: 500;
        padding-top: 1rem;
        font-size: 1.2rem;
      }

      .img-description p {
        font-size: 1.2rem;
        padding: 0.4rem 2rem 1rem 2rem;
        margin-top: 1.5rem;
        font-weight: 400;
        line-height: 1.4;
        color: rgba(32, 32, 31, 0.724);
      }
      .hobbies h3 {
        font-size: 1.6rem;
        font-weight: 900;
        margin-bottom: 1.5rem;
        color: rgba(32, 32, 31, 0.954);
      }

      .hobbies .hobbies-desc span {
        display: inline;
        font-size: 1.2rem;
        margin: 1rem;
        color: rgba(32, 32, 31, 0.724);
      }

      .btn a {
        display: inline-block;
        text-decoration: none;
        margin-top: 1.8rem;
        padding: 1.2rem;
        font-size: 1.3rem;
        font-weight: 500;
        border-radius: 0.8rem;
        background-color: rgba(137, 43, 226, 0.792);
        color: white;
      }
    </style>
  </head>
  <body>
    <!-- Profile Card  -->
    <div class="box">
      <div class="img">
        <img src="./Ikhtiar's pic.png" alt="Ikhtiar's pic" />
      </div>
      <div class="img-description">
        <h1>Ikhtiar Ali</h1>
        <span>Web Developer</span>
        <p>
          Hello! I'm Ikhtiar, a passionate web developer who loves creating
          beautiful and functional websites.
        </p>
      </div>
      <div class="hobbies">
        <h3>My Hobbies</h3>
        <div class="hobbies-desc">
          <span>Reading</span>
          <span>Traveling</span>
          <span>Photography</span>
        </div>
      </div>
      <div class="btn">
        <a href="mailto:aliikhtiar173@gmail.com">Contact Me</a>
      </div>
    </div>
  </body>
</html>
