<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        font-family: "Arial Narrow Bold", sans-serif;
      }
      html {
        font-size: 62.5%;
      }
      .container {
        width: 20%;
        height: auto;
        margin: 3rem auto;
        padding: 4rem;
        border: 0.2rem solid rgba(0, 128, 0, 0.123);
        border-radius: .8rem;
        text-align: left;
        box-shadow: .2rem .2rem .2rem rgba(0,0,0,0.3);
      }
         .container h1{
          text-align: center;
          font-size: 2.4rem;
         }
        .field label{
        font-size: 1.5rem;
        display: block;
        margin-bottom: .5rem;
      }
      .field input{
        min-width: 95%;
        padding: .7rem;
        border: .1rem solid rgba(138, 122, 122, 0.276);
        border-radius: .6rem;
        margin-bottom: 1rem;
        margin-left: .5rem;
      }
      .checkfor-field{
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 1.3rem;
        margin-top: 1rem;
      }
      .checkfor-field a{
        text-decoration: none;
        color: blue;
      } 

      .login-btn{
        display: inline-block;
        margin-top: 1.5rem;
        padding: 1rem;
        background-color: rgb(47, 89, 215);
        border-radius: .6rem;
        min-width: 95%;
        text-align: center;
      }

      .login-btn a{
        text-decoration: none;
        color: white;
        font-size: 1.5rem;
      }

      .signup-btn{
        text-align: center;
        margin-top: 1.5rem;
        font-size: 1.3rem;

      }

      .signup-btn a{
        text-decoration: none;
        color: blue;
      }
       </style>
  </head>
  <body>
    <div class="container">
      <h1>Login</h1>
      <form action="#">
        <div class="email-field field">
          <label for="email">Email</label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Enter your email"
          !required/>
        </div>
        <div class="pass-field field">
          <label for="pass">Password</label>
          <input
            type="password"
            name="password"
            id="pass"
            placeholder="Enter your password"
          />
        </div>
        <div class="checkfor-field">
          <div class="check">
            <input type="checkbox" name="checkbox" id="check" />
            <label for="check">Remember Me</label>
          </div>
          <a href="#">Forgot Password?</a>
        </div>
        <div class="login-btn">
          <a href="#">Login</a>
        </div>
        <div class="signup-btn">
          <p>Don't have an account? <a href="#">Sign up</a></p>
        </div>
      </form>
    </div>
  </body>
</html>
